<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="70%">
      <stop offset="0%" stop-color="#1E1E1E"/>
      <stop offset="100%" stop-color="#070707"/>
    </radialGradient>
    <filter id="glow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="white" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Dumbbell at -40 degrees -->
  <g transform="translate(256,256) rotate(-40)" filter="url(#glow)">
    <!-- Left outer plate -->
    <rect x="-174" y="-50" width="42" height="100" rx="9" fill="white"/>
    <!-- Left inner plate (3px gap) -->
    <rect x="-129" y="-37" width="35" height="74" rx="7" fill="white"/>
    <!-- Left collar (3px gap) -->
    <rect x="-91" y="-14" width="21" height="28" rx="5" fill="white"/>
    <!-- Handle (3px gap) -->
    <rect x="-67" y="-9" width="134" height="18" rx="9" fill="white"/>
    <!-- Right collar (3px gap) -->
    <rect x="70" y="-14" width="21" height="28" rx="5" fill="white"/>
    <!-- Right inner plate (3px gap) -->
    <rect x="94" y="-37" width="35" height="74" rx="7" fill="white"/>
    <!-- Right outer plate (3px gap) -->
    <rect x="132" y="-50" width="42" height="100" rx="9" fill="white"/>
  </g>
</svg>
